name: Build iOS (GitHub Actions)

on:
  push:
    branches:
      - develop
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_debug:
        description: 'Build Debug IPA'
        required: false
        default: true
        type: boolean
      build_release:
        description: 'Build Release IPA'
        required: false
        default: false
        type: boolean

env:
  IOS_XCODE_VERSION: "16.0"
  IOS_DEPLOYMENT_TARGET: "15.0"
  # Gitea LFS 配置
  GITEA_TOKEN: "73ffc0f4391a26bb327fbed379d63b5a087e5f10"

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository (without LFS)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          lfs: false

      - name: Setup Git LFS and download from Gitea
        run: |
          echo "========================================"
          echo "Configuring Git LFS to use Gitea..."
          echo "========================================"

          # 安装 Git LFS
          brew install git-lfs || true
          git lfs install

          # 配置 LFS 使用 Gitea 服务器（带认证）
          git config --global lfs.url "https://admin:${{ env.GITEA_TOKEN }}@git.viaeon.com/admin/UUVPN.git/info/lfs"

          echo ""
          echo "Downloading LFS files from Gitea..."
          git lfs pull 2>&1 || echo "LFS pull failed, trying alternative method..."

          # 如果失败，尝试 fetch + checkout
          git lfs fetch origin 2>&1 || true
          git lfs checkout 2>&1 || true

      - name: Verify Libbox.xcframework
        run: |
          echo "========================================"
          echo "Checking Libbox.xcframework..."
          echo "========================================"

          ls -la iOS-SwiftUI-Code/Libbox.xcframework/ || echo "Libbox.xcframework not found"

          # 检查框架内容
          if [ -d "iOS-SwiftUI-Code/Libbox.xcframework" ]; then
            echo "✅ Libbox.xcframework directory exists"
            ls -la iOS-SwiftUI-Code/Libbox.xcframework/

            # 检查文件大小（确保是真正的二进制文件，不是 LFS 指针）
            echo ""
            echo "Checking file sizes..."
            ls -la iOS-SwiftUI-Code/Libbox.xcframework/ios-arm64/Libbox.framework/Libbox 2>/dev/null || echo "ios-arm64 Libbox not found"

            # 检查是否是 LFS 指针
            FILE_SIZE=$(stat -f%z "iOS-SwiftUI-Code/Libbox.xcframework/ios-arm64/Libbox.framework/Libbox" 2>/dev/null || echo "0")
            if [ "$FILE_SIZE" -gt 100 ]; then
              echo "✅ LFS files downloaded successfully (size: ${FILE_SIZE} bytes)"
            else
              echo "❌ LFS files are still pointers (size: ${FILE_SIZE} bytes)"
              echo "File content:"
              head -5 iOS-SwiftUI-Code/Libbox.xcframework/ios-arm64/Libbox.framework/Libbox 2>/dev/null || true
            fi
          else
            echo "❌ Libbox.xcframework not found"
            exit 1
          fi

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.IOS_XCODE_VERSION }}

      - name: List available schemes
        run: |
          echo "========================================"
          echo "Available Xcode schemes..."
          echo "========================================"
          cd iOS-SwiftUI-Code

          # 尝试列出 schemes
          xcodebuild -list -project uuvpn.xcodeproj 2>/dev/null || xcodebuild -list -workspace uuvpn.xcworkspace 2>/dev/null || echo "Could not list schemes"

      - name: Build iOS Debug
        if: ${{ github.event.inputs.build_debug == 'true' || github.event_name == 'push' }}
        run: |
          echo "========================================"
          echo "Building iOS Debug..."
          echo "========================================"

          cd iOS-SwiftUI-Code

          # 构建 Debug 版本
          xcodebuild \
            -project uuvpn.xcodeproj \
            -scheme SFI \
            -sdk iphoneos \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee build.log || echo "Build completed with issues"

          echo ""
          echo "Build results:"
          find build -name "*.app" -type d 2>/dev/null | head -5 || echo "No .app found"

      - name: Create IPA from .app
        if: ${{ github.event.inputs.build_debug == 'true' || github.event_name == 'push' }}
        run: |
          echo "========================================"
          echo "Creating IPA file..."
          echo "========================================"

          cd iOS-SwiftUI-Code

          # 查找 .app 文件
          APP_PATH=$(find build -name "*.app" -type d | grep -v "Watch" | head -1)

          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            echo "Found .app at: $APP_PATH"

            # 创建 IPA
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r "UUVPN-debug.ipa" Payload

            echo "✅ IPA created: UUVPN-debug.ipa"
            ls -lh UUVPN-debug.ipa
          else
            echo "❌ No .app found, cannot create IPA"
            echo ""
            echo "Searching for .app files..."
            find build -name "*.app" -type d 2>/dev/null || true
          fi

      - name: Upload IPA Artifact
        if: ${{ github.event.inputs.build_debug == 'true' || github.event_name == 'push' }}
        uses: actions/upload-artifact@v4
        with:
          name: UUVPN-iOS-Debug
          path: iOS-SwiftUI-Code/*.ipa
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Log
          path: iOS-SwiftUI-Code/build.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Build Summary
        if: always()
        run: |
          echo "========================================"
          echo "iOS Build Summary"
          echo "========================================"
          echo "Xcode version: $(xcodebuild -version 2>/dev/null || echo 'Unknown')"
          echo ""
          echo "Artifacts:"
          ls -lh iOS-SwiftUI-Code/*.ipa 2>/dev/null || echo "No IPA files created"
          echo ""
          echo "Build completed!"