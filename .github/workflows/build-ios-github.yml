name: Build iOS (GitHub Actions)

on:
  push:
    branches:
      - develop
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_debug:
        description: 'Build Debug IPA'
        required: false
        default: true
        type: boolean
      build_release:
        description: 'Build Release IPA'
        required: false
        default: false
        type: boolean

env:
  IOS_XCODE_VERSION: "16.0"
  IOS_DEPLOYMENT_TARGET: "15.0"

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          lfs: true

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.IOS_XCODE_VERSION }}

      - name: Check Libbox.xcframework
        run: |
          echo "========================================"
          echo "Checking Libbox.xcframework..."
          echo "========================================"
          ls -la iOS-SwiftUI-Code/Libbox.xcframework/ || echo "Libbox.xcframework not found"

          # 检查框架内容
          if [ -d "iOS-SwiftUI-Code/Libbox.xcframework" ]; then
            echo "✅ Libbox.xcframework exists"
            ls -la iOS-SwiftUI-Code/Libbox.xcframework/ios-arm64/Libbox.framework/ || true
          else
            echo "❌ Libbox.xcframework not found"
            exit 1
          fi

      - name: Build iOS Debug IPA
        if: ${{ github.event.inputs.build_debug == 'true' || github.event_name == 'push' }}
        run: |
          echo "========================================"
          echo "Building iOS Debug IPA..."
          echo "========================================"

          cd iOS-SwiftUI-Code

          # 列出可用的 scheme
          xcodebuild -list -project uuvpn.xcodeproj || xcodebuild -list -workspace uuvpn.xcworkspace || true

          # 构建 Debug 版本
          xcodebuild \
            -project uuvpn.xcodeproj \
            -scheme SFI \
            -sdk iphoneos \
            -configuration Debug \
            -derivedDataPath build \
            -archivePath build/archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build | tee build.log || echo "Build may have issues"

          # 检查构建结果
          echo ""
          echo "Build results:"
          find build -name "*.app" -type d 2>/dev/null || echo "No .app found"
          find build -name "*.ipa" -type f 2>/dev/null || echo "No .ipa found"

      - name: Create IPA from .app
        if: ${{ github.event.inputs.build_debug == 'true' || github.event_name == 'push' }}
        run: |
          echo "========================================"
          echo "Creating IPA file..."
          echo "========================================"

          cd iOS-SwiftUI-Code

          # 查找 .app 文件
          APP_PATH=$(find build -name "*.app" -type d | head -1)

          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            echo "Found .app at: $APP_PATH"

            # 创建 IPA
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r "UUVPN-debug.ipa" Payload

            echo "✅ IPA created: UUVPN-debug.ipa"
            ls -la UUVPN-debug.ipa
          else
            echo "❌ No .app found, cannot create IPA"

            # 尝试直接使用 xcodebuild 的 archive 功能
            echo ""
            echo "Attempting alternative archive method..."

            xcodebuild \
              -project uuvpn.xcodeproj \
              -scheme SFI \
              -sdk iphoneos \
              -configuration Debug \
              -archivePath build/UUVPN.xcarchive \
              archive \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO || echo "Archive failed"
          fi

      - name: Upload IPA Artifact
        if: ${{ github.event.inputs.build_debug == 'true' || github.event_name == 'push' }}
        uses: actions/upload-artifact@v4
        with:
          name: UUVPN-iOS-Debug
          path: iOS-SwiftUI-Code/*.ipa
          retention-days: 30

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Log
          path: iOS-SwiftUI-Code/build.log
          retention-days: 7

      - name: Build Summary
        if: always()
        run: |
          echo "========================================"
          echo "iOS Build Summary"
          echo "========================================"
          echo "Xcode version: $(xcodebuild -version)"
          echo ""
          echo "Artifacts:"
          ls -la iOS-SwiftUI-Code/*.ipa 2>/dev/null || echo "No IPA files"
          echo ""
          echo "Build completed!"