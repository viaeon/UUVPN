name: Build iOS (GitHub Actions)

on:
  push:
    branches:
      - develop
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_debug:
        description: 'Build Debug IPA'
        required: false
        default: true
        type: boolean
      build_release:
        description: 'Build Release IPA'
        required: false
        default: false
        type: boolean

env:
  IOS_XCODE_VERSION: "16.0"
  IOS_DEPLOYMENT_TARGET: "15.0"

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          lfs: true

      - name: Download Libbox.xcframework from upstream
        run: |
          echo "========================================"
          echo "Downloading Libbox.xcframework from nicolastinkl/UUVPN..."
          echo "========================================"

          # 删除现有的 Libbox.xcframework（可能是空的或损坏的）
          rm -rf iOS-SwiftUI-Code/Libbox.xcframework

          # 从上游仓库下载
          git clone --depth 1 https://github.com/nicolastinkl/UUVPN.git /tmp/upstream

          # 复制 Libbox.xcframework
          cp -r /tmp/upstream/iOS-SwiftUI-Code/Libbox.xcframework iOS-SwiftUI-Code/

          # 检查结果
          echo ""
          echo "Libbox.xcframework downloaded:"
          ls -la iOS-SwiftUI-Code/Libbox.xcframework/

          # 检查文件大小
          echo ""
          echo "Checking file sizes..."
          ls -la iOS-SwiftUI-Code/Libbox.xcframework/ios-arm64/Libbox.framework/Libbox 2>/dev/null || echo "ios-arm64 Libbox not found"

          # 清理临时文件
          rm -rf /tmp/upstream

      - name: Verify Libbox.xcframework
        run: |
          echo "========================================"
          echo "Verifying Libbox.xcframework..."
          echo "========================================"

          if [ -d "iOS-SwiftUI-Code/Libbox.xcframework" ]; then
            echo "✅ Libbox.xcframework exists"
            ls -la iOS-SwiftUI-Code/Libbox.xcframework/

            # 检查文件大小（确保是真正的二进制文件）
            FILE_SIZE=$(stat -f%z "iOS-SwiftUI-Code/Libbox.xcframework/ios-arm64/Libbox.framework/Libbox" 2>/dev/null || echo "0")
            if [ "$FILE_SIZE" -gt 1000000 ]; then
              echo "✅ Libbox files are valid (size: ${FILE_SIZE} bytes)"
            else
              echo "❌ Libbox files may be corrupted (size: ${FILE_SIZE} bytes)"
              echo "File content:"
              head -5 iOS-SwiftUI-Code/Libbox.xcframework/ios-arm64/Libbox.framework/Libbox 2>/dev/null || true
            fi
          else
            echo "❌ Libbox.xcframework not found"
            exit 1
          fi

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.IOS_XCODE_VERSION }}

      - name: List available schemes
        run: |
          echo "========================================"
          echo "Available Xcode schemes..."
          echo "========================================"
          cd iOS-SwiftUI-Code

          # 尝试列出 schemes
          xcodebuild -list -project uuvpn.xcodeproj 2>/dev/null || xcodebuild -list -workspace uuvpn.xcworkspace 2>/dev/null || echo "Could not list schemes"

      - name: Build iOS Debug
        if: ${{ github.event.inputs.build_debug == 'true' || github.event_name == 'push' }}
        run: |
          echo "========================================"
          echo "Building iOS Debug..."
          echo "========================================"

          cd iOS-SwiftUI-Code

          # 构建 Debug 版本
          xcodebuild \
            -project uuvpn.xcodeproj \
            -scheme SFI \
            -sdk iphoneos \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee build.log || echo "Build completed with issues"

          echo ""
          echo "Build results:"
          find build -name "*.app" -type d 2>/dev/null | head -5 || echo "No .app found"

      - name: Create IPA from .app
        if: ${{ github.event.inputs.build_debug == 'true' || github.event_name == 'push' }}
        run: |
          echo "========================================"
          echo "Creating IPA file..."
          echo "========================================"

          cd iOS-SwiftUI-Code

          # 查找 .app 文件
          APP_PATH=$(find build -name "*.app" -type d | grep -v "Watch" | head -1)

          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            echo "Found .app at: $APP_PATH"

            # 创建 IPA
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r "UUVPN-debug.ipa" Payload

            echo "✅ IPA created: UUVPN-debug.ipa"
            ls -lh UUVPN-debug.ipa
          else
            echo "❌ No .app found, cannot create IPA"
            echo ""
            echo "Searching for .app files..."
            find build -name "*.app" -type d 2>/dev/null || true
          fi

      - name: Upload IPA Artifact
        if: ${{ github.event.inputs.build_debug == 'true' || github.event_name == 'push' }}
        uses: actions/upload-artifact@v4
        with:
          name: UUVPN-iOS-Debug
          path: iOS-SwiftUI-Code/*.ipa
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Log
          path: iOS-SwiftUI-Code/build.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Build Summary
        if: always()
        run: |
          echo "========================================"
          echo "iOS Build Summary"
          echo "========================================"
          echo "Xcode version: $(xcodebuild -version 2>/dev/null || echo 'Unknown')"
          echo ""
          echo "Artifacts:"
          ls -lh iOS-SwiftUI-Code/*.ipa 2>/dev/null || echo "No IPA files created"
          echo ""
          echo "Build completed!"