name: Build iOS (GitHub Actions)

on:
  push:
    branches:
      - develop
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  IOS_XCODE_VERSION: "16.4"

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Download and restore Libbox.xcframework
        run: |
          echo "========================================"
          echo "Downloading Libbox.xcframework from upstream..."
          echo "========================================"

          cd iOS-SwiftUI-Code

          # 删除现有的 Libbox.xcframework（可能是空的或损坏的）
          rm -rf Libbox.xcframework
          rm -rf LibboxLocal/Libbox.xcframework

          # 从上游仓库下载
          git clone --depth 1 https://github.com/nicolastinkl/UUVPN.git /tmp/upstream

          # 复制到项目根目录（直接框架引用）
          cp -r /tmp/upstream/iOS-SwiftUI-Code/Libbox.xcframework ./

          # 同时复制到 LibboxLocal 目录（XCLocalSwiftPackageReference binaryTarget 引用）
          mkdir -p LibboxLocal
          cp -r /tmp/upstream/iOS-SwiftUI-Code/Libbox.xcframework LibboxLocal/

          # 清理临时文件
          rm -rf /tmp/upstream

          # 验证两个位置的文件
          echo ""
          echo "=== Root Libbox.xcframework ==="
          ls -lh Libbox.xcframework/
          FILE_SIZE=$(stat -f%z "Libbox.xcframework/ios-arm64/Libbox.framework/Versions/A/Libbox" 2>/dev/null || stat -f%z "Libbox.xcframework/ios-arm64/Libbox.framework/Libbox" 2>/dev/null || echo "0")
          echo "Arm64 binary size: $FILE_SIZE bytes"

          echo ""
          echo "=== LibboxLocal/Libbox.xcframework ==="
          ls -lh LibboxLocal/Libbox.xcframework/
          FILE_SIZE2=$(stat -f%z "LibboxLocal/Libbox.xcframework/ios-arm64/Libbox.framework/Versions/A/Libbox" 2>/dev/null || stat -f%z "LibboxLocal/Libbox.xcframework/ios-arm64/Libbox.framework/Libbox" 2>/dev/null || echo "0")
          echo "Arm64 binary size: $FILE_SIZE2 bytes"

          if [ "$FILE_SIZE" -gt 1000000 ] && [ "$FILE_SIZE2" -gt 1000000 ]; then
            echo "✅ Both Libbox.xcframework copies are valid"
          else
            echo "❌ Libbox.xcframework files are corrupted"
            exit 1
          fi

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve Swift Package Dependencies
        run: |
          cd iOS-SwiftUI-Code
          xcodebuild -resolvePackageDependencies -project uuvpn.xcodeproj -scheme SFI

      - name: Build iOS (iphoneos)
        run: |
          cd iOS-SwiftUI-Code

          xcodebuild clean build \
            -project uuvpn.xcodeproj \
            -scheme SFI \
            -sdk iphoneos \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_ENABLE_EXPLICIT_MODULES=NO \
            2>&1 | tee build.log

          if grep -q "BUILD SUCCEEDED" build.log; then
            echo "✅ BUILD SUCCEEDED"
          else
            echo "❌ BUILD FAILED"
            grep -i "error:" build.log || true
            exit 1
          fi

      - name: Create IPA from .app (full version)
        run: |
          cd iOS-SwiftUI-Code

          # 查找 .app 文件
          APP_PATH=$(find build -name "*.app" -type d | grep -v "Watch" | head -1)

          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            echo "Found .app at: $APP_PATH"

            # 创建完整版 IPA（包含 VPN 扩展，需要开发者账号签名）
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r "UUVPN-debug.ipa" Payload

            echo "✅ Full IPA created: UUVPN-debug.ipa"
            ls -lh UUVPN-debug.ipa

            rm -rf Payload
          else
            echo "❌ No .app found, cannot create IPA"
            find build -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi

      - name: Create UI Test IPA (free signing compatible)
        run: |
          cd iOS-SwiftUI-Code

          # 查找 .app 文件
          APP_PATH=$(find build -name "*.app" -type d | grep -v "Watch" | head -1)

          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "❌ No .app found"
            exit 1
          fi

          echo "Creating UI Test IPA from: $APP_PATH"

          # 复制 .app 到临时目录
          cp -r "$APP_PATH" /tmp/UUVPN-uitest.app

          # 1. 删除嵌入的扩展（VPN Extension、IntentsExtension 等）
          echo ""
          echo "Removing embedded extensions..."
          ls -la /tmp/UUVPN-uitest.app/PlugIns/ 2>/dev/null || echo "No PlugIns directory"
          rm -rf /tmp/UUVPN-uitest.app/PlugIns
          echo "PlugIns removed"

          # 2. 删除 archived-expanded-entitlements.xcent（包含原始 entitlements）
          rm -f /tmp/UUVPN-uitest.app/archived-expanded-entitlements.xcent 2>/dev/null || true

          # 3. 修改 Info.plist，移除需要付费开发者账号的配置
          echo ""
          echo "Stripping restricted keys from Info.plist..."
          /usr/libexec/PlistBuddy -c "Delete :NSExtension" /tmp/UUVPN-uitest.app/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Delete :UIBackgroundModes" /tmp/UUVPN-uitest.app/Info.plist 2>/dev/null || true

          # 4. 创建最小化的 entitlements 文件
          echo ""
          echo "Creating minimal entitlements for free Apple ID signing..."
          /usr/libexec/PlistBuddy -c "Add : dict" /tmp/minimal-entitlements.plist 2>/dev/null || true
          # PlistBuddy 会自动创建有效的空 dict plist

          # 5. 用 codesign 重新签名，替换二进制中嵌入的 entitlements
          #    这是最关键的一步 - 原始 entitlements 编译进了 Mach-O 二进制
          #    必须用 codesign --entitlements 重签才能替换
          echo ""
          echo "Re-signing app with minimal entitlements (ad-hoc)..."
          codesign --entitlements /tmp/minimal-entitlements.plist --force --deep -s - /tmp/UUVPN-uitest.app 2>&1 || {
            echo "Deep signing failed, trying individual signing..."
            # 先签 frameworks
            for framework in /tmp/UUVPN-uitest.app/Frameworks/*.framework; do
              if [ -d "$framework" ]; then
                echo "Signing framework: $framework"
                codesign --force -s - "$framework" 2>/dev/null || true
              fi
            done
            for dylib in /tmp/UUVPN-uitest.app/Frameworks/*.dylib; do
              if [ -f "$dylib" ]; then
                echo "Signing dylib: $dylib"
                codesign --force -s - "$dylib" 2>/dev/null || true
              fi
            done
            # 再签主 app
            codesign --entitlements /tmp/minimal-entitlements.plist --force -s - /tmp/UUVPN-uitest.app 2>&1 || true
          }

          # 验证签名和 entitlements
          echo ""
          echo "Verifying signature..."
          codesign -dvv /tmp/UUVPN-uitest.app 2>&1 | head -20 || true
          echo ""
          echo "Current entitlements:"
          codesign -d --entitlements :- /tmp/UUVPN-uitest.app 2>&1 || true

          # 6. 创建 UI 测试版 IPA
          mkdir -p Payload
          cp -r /tmp/UUVPN-uitest.app Payload/uuvpn.app
          zip -r "UUVPN-uitest.ipa" Payload

          echo ""
          echo "✅ UI Test IPA created: UUVPN-uitest.ipa"
          ls -lh UUVPN-uitest.ipa

          # 清理
          rm -rf Payload /tmp/UUVPN-uitest.app /tmp/minimal-entitlements.plist

      - name: Upload Full IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UUVPN-iOS-Full
          path: iOS-SwiftUI-Code/UUVPN-debug.ipa
          retention-days: 30

      - name: Upload UI Test IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UUVPN-iOS-UITest
          path: iOS-SwiftUI-Code/UUVPN-uitest.ipa
          retention-days: 30

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Build-Log
          path: iOS-SwiftUI-Code/build.log
          retention-days: 7
