name: Build Debug

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  # ==================== Android Debug 构建 ====================
  build-android-debug:
    name: Build Android Debug APK
    runs-on: ubuntu
    env:
      RUNNER_TOOL_CACHE: /toolcache

    steps:
      - name: Install Node.js
        run: |
          export PATH="/toolcache/bin:$PATH"
          if ! command -v node &> /dev/null; then
            if command -v apk &> /dev/null; then
              apk add --no-cache nodejs npm
            else
              curl -fsSL https://nodejs.org/dist/v20.0.0/node-v20.0.0-linux-x64.tar.xz | tar -xJ -C /tmp
              mkdir -p /toolcache
              cp -r /tmp/node-v20.0.0-linux-x64/{bin,lib,share} /toolcache/
            fi
          fi
          node --version

      - name: Install Git LFS
        run: |
          if command -v apk &> /dev/null; then
            apk add --no-cache git-lfs
          elif command -v apt-get &> /dev/null; then
            apt-get update && apt-get install -y git-lfs
          else
            curl -sL https://github.com/git-lfs/git-lfs/releases/download/v3.5.1/git-lfs-linux-amd64-v3.5.1.tar.gz | tar xz -C /tmp
            mv /tmp/git-lfs-3.5.1/git-lfs /toolcache/bin/
          fi
          git lfs install

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Pull Git LFS files
        run: |
          git lfs install
          git lfs pull || echo "LFS pull failed, continuing without LFS files (Android build doesn't need them)"

      - name: Install Java 17
        run: |
          if command -v apk &> /dev/null; then
            # Enable community repository for openjdk17-jdk
            sed -i 's/^#.*\/community\/.*$/\0/' /etc/apk/repositories || true
            echo "https://dl-cdn.alpinelinux.org/alpine/latest-stable/community" >> /etc/apk/repositories
            apk update
            apk add --no-cache openjdk17-jdk
            echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk" >> $GITHUB_ENV
          elif command -v apt-get &> /dev/null; then
            apt-get update && apt-get install -y openjdk-17-jdk
            echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          else
            curl -sL https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.9%2B9/OpenJDK17U-jdk_x64_linux_hotspot_17.0.9_9.tar.gz | tar xz -C /toolcache
            echo "JAVA_HOME=/toolcache/jdk-17.0.9+9" >> $GITHUB_ENV
            echo "/toolcache/jdk-17.0.9+9/bin" >> $GITHUB_PATH
          fi
          java -version

      - name: Install Go 1.23
        run: |
          # Create toolcache directory if not exists
          mkdir -p /toolcache
          # Install curl if not available (Alpine uses apk)
          if ! command -v curl &> /dev/null; then
            if command -v apk &> /dev/null; then
              apk add --no-cache curl
            fi
          fi
          # Download Go 1.23 directly to ensure correct version
          curl -sL https://go.dev/dl/go1.23.0.linux-amd64.tar.gz | tar xz -C /toolcache
          echo "/toolcache/go/bin" >> $GITHUB_PATH
          echo "GOROOT=/toolcache/go" >> $GITHUB_ENV
          /toolcache/go/bin/go version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: |
          cd Android-kotlin-Code
          chmod +x gradlew

      - name: Create local.properties
        run: |
          cd Android-kotlin-Code
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build Android Debug APK
        run: |
          cd Android-kotlin-Code
          ./gradlew app:assembleDebug --stacktrace

      - name: List APK files
        run: |
          echo "Listing APK files..."
          find Android-kotlin-Code/app/build/outputs/apk -name "*.apk" -type f || echo "No APK files found"
          ls -la Android-kotlin-Code/app/build/outputs/apk/ || true

      - name: Copy APK to artifacts
        run: |
          mkdir -p /tmp/artifacts
          find Android-kotlin-Code/app/build/outputs/apk -name "*.apk" -type f -exec cp {} /tmp/artifacts/ \;
          ls -la /tmp/artifacts/
          echo "APK files copied to /tmp/artifacts"

  # ==================== iOS Debug 构建 ====================
  build-ios-debug:
    name: Build iOS Debug App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Download and restore Libbox.xcframework
        run: |
          echo "========================================"
          echo "Downloading Libbox.xcframework from upstream..."
          echo "========================================"

          cd iOS-SwiftUI-Code

          # 从上游仓库下载完整的 Libbox.xcframework
          rm -rf Libbox.xcframework
          rm -rf LibboxLocal/Libbox.xcframework

          git clone --depth 1 https://github.com/nicolastinkl/UUVPN.git /tmp/upstream

          # 复制到项目根目录（直接框架引用）
          cp -r /tmp/upstream/iOS-SwiftUI-Code/Libbox.xcframework ./

          # 同时复制到 LibboxLocal 目录（XCLocalSwiftPackageReference binaryTarget 引用）
          mkdir -p LibboxLocal
          cp -r /tmp/upstream/iOS-SwiftUI-Code/Libbox.xcframework LibboxLocal/

          # 清理临时文件
          rm -rf /tmp/upstream

          # 验证两个位置的文件
          echo ""
          echo "=== Root Libbox.xcframework ==="
          ls -lh Libbox.xcframework/
          FILE_SIZE=$(stat -f%z "Libbox.xcframework/ios-arm64_x86_64-simulator/Libbox.framework/Versions/A/Libbox" 2>/dev/null || echo "0")
          echo "Simulator binary size: $FILE_SIZE bytes"

          echo ""
          echo "=== LibboxLocal/Libbox.xcframework ==="
          ls -lh LibboxLocal/Libbox.xcframework/
          FILE_SIZE2=$(stat -f%z "LibboxLocal/Libbox.xcframework/ios-arm64_x86_64-simulator/Libbox.framework/Versions/A/Libbox" 2>/dev/null || echo "0")
          echo "Simulator binary size: $FILE_SIZE2 bytes"

          if [ "$FILE_SIZE" -gt 1000000 ] && [ "$FILE_SIZE2" -gt 1000000 ]; then
            echo "✅ Both Libbox.xcframework copies are valid"
          else
            echo "❌ Libbox.xcframework files are corrupted"
            exit 1
          fi

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Show Xcode version
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve Swift Package Dependencies
        run: |
          cd iOS-SwiftUI-Code
          xcodebuild -resolvePackageDependencies -project uuvpn.xcodeproj -scheme SFI

      - name: Build iOS Debug App
        id: build
        run: |
          cd iOS-SwiftUI-Code
          xcodebuild clean build \
            -project uuvpn.xcodeproj \
            -scheme SFI \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone Air,OS=26.2' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            SWIFT_ENABLE_EXPLICIT_MODULES=NO \
            2>&1 | tee build_output.log

          # 检查构建结果
          if grep -q "BUILD SUCCEEDED" build_output.log; then
            echo "✅ BUILD SUCCEEDED"
            echo "build_status=succeeded" >> $GITHUB_OUTPUT
          else
            echo "❌ BUILD FAILED"
            echo "=== Error lines from build log ==="
            grep -i "error:" build_output.log || echo "No 'error:' lines found"
            echo ""
            echo "=== Last 100 lines of build log ==="
            tail -100 build_output.log
            echo "build_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Create IPA from .app
        if: success()
        run: |
          cd iOS-SwiftUI-Code

          # 查找 .app 文件
          echo "Searching for .app files in DerivedData..."
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "SFI.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d | grep -v "Watch" | head -n 1)
          fi

          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            echo "✅ Found app at: $APP_PATH"

            # 创建 IPA
            mkdir -p Payload
            cp -R "$APP_PATH" Payload/
            zip -r "UUVPN-debug.ipa" Payload

            echo "✅ IPA created: UUVPN-debug.ipa"
            ls -lh UUVPN-debug.ipa
          else
            echo "❌ No .app file found in DerivedData"
            exit 1
          fi

      - name: Upload iOS Debug App
        uses: actions/upload-artifact@v4
        with:
          name: UUVPN-iOS-Debug
          path: iOS-SwiftUI-Code/UUVPN-debug.ipa
          retention-days: 30

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Build-Log
          path: iOS-SwiftUI-Code/build_output.log
          retention-days: 7
